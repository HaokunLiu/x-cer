# Hardware-based presets that map to cluster-specific configurations
presets:
  gpu_l40s:
    # Base configuration
    base:
      gres: "gpu:l40s:1"
      time: "24:00:00"
      mem: "32G"
      cpus-per-task: 8
    # Cluster-specific overrides
    cluster_configs:
      cluster1:
        partition: gpu-partition
        qos: normal
        account: research_group
      cluster2:
        # This hardware not available on cluster2
        available: false
        
  gpu_h100:
    base:
      gres: "gpu:h100:1"
      time: "12:00:00"
      mem: "64G"
      cpus-per-task: 16
    cluster_configs:
      cluster1:
        # Not available on cluster1
        available: false
      cluster2:
        partition: gpu-h100
        qos: standard
        account: lab_account
        
  gpu_a100:
    base:
      gres: "gpu:a100:1"
      time: "18:00:00"
      mem: "48G"
      cpus-per-task: 12
    cluster_configs:
      cluster1:
        partition: gpu-partition
        qos: normal
        account: research_group
      cluster2:
        available: false
        
  cpu_large:
    base:
      cpus-per-task: 16
      time: "48:00:00"
      mem: "128G"
    cluster_configs:
      cluster1:
        partition: cpu-nodes
        qos: normal
        account: research_group
      cluster2:
        partition: compute
        qos: standard
        account: lab_account
        
  interactive_gpu:
    base:
      gres: "gpu:1"
      time: "4:00:00"
      mem: "16G"
      cpus-per-task: 4
    cluster_configs:
      cluster1:
        partition: dev
        qos: debug
        account: research_group
      cluster2:
        partition: interactive
        qos: test
        account: lab_account

# Environment presets for different software stacks
environments:
  pytorch_latest:
    conda_env: pytorch_2.1
    modules:
      - cuda/12.1
      - cudnn/8.9
    env_vars:
      CUDA_VISIBLE_DEVICES: "0"
      
  tensorflow_stable:
    conda_env: tf_2.13
    modules:
      - cuda/11.8
      - cudnn/8.6
    env_vars:
      TF_CPP_MIN_LOG_LEVEL: "2"
      
  custom_ml:
    conda_env: my_research_env
    modules:
      - gcc/11.2
      - openmpi/4.1
    env_vars:
      OMP_NUM_THREADS: "8" 